engine: v3
title: "Deep nesting — page → panel → columns → boxes"
root:
  id: page
  direction: vertical
  padding: 24
  border: none
  children:
    - id: header
      label: [Platform Architecture]
      icon: Cloud.svg

    - id: main_panel
      direction: horizontal
      padding: 8
      border: solid
      heading: Infrastructure
      children:
        - id: col_left
          direction: vertical
          padding: 8
          border: solid
          heading: Compute
          children:
            - id: vm_1
              label: [VM Instance A]
              icon: Server.svg
            - id: vm_2
              label: [VM Instance B]
              icon: Server.svg
            - id: vm_3
              label: [VM Instance C]

        - id: col_right
          direction: vertical
          padding: 8
          border: solid
          heading: Storage
          children:
            - id: disk_1
              label: [Block Storage]
              icon: Storage node.svg
            - id: disk_2
              label: [Object Store]
              icon: Storage node.svg

    - id: footer
      label: [Networking layer]
