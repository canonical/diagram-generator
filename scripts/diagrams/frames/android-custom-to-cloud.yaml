engine: v3
title: Custom Android to Anbox Cloud
grid:
  cols: 4
  col_gap: 32
  row_gap: 32
arrows:
- source: custom_files
  target: host_tools
- source: host_tools
  target: anbox_cloud
- source: anbox_cloud
  target: virt_instance
root:
  id: page
  direction: vertical
  gap: 32
  padding: 24
  width: 464
  sizing_w: fixed
  children:
  - id: custom_files
    level: 3
    direction: vertical
    gap: 0
    padding: 8
    sizing_h: fill
    heading: Custom Android files
    icon: SD card.svg
    children:
    - id: partitions
      level: 2
      direction: vertical
      gap: 0
      padding: 8
      heading: Partitions
      children:
      - id: system_image
        label:
        - Android system image
      - id: kernel
        label:
        - Kernel
  - id: host_tools
    level: 3
    direction: vertical
    gap: 0
    padding: 8
    sizing_h: hug
    heading: Host-side tools
    icon: Wrench 1.svg
    children:
    - id: cvd
      label:
      - cvd
    - id: launchers
      label:
      - Launchers
  - id: anbox_cloud
    level: 3
    direction: vertical
    gap: 0
    padding: 8
    sizing_h: hug
    heading: Anbox Cloud
    icon: Cloud.svg
    children:
    - id: consume_system_images
      label:
      - '- Consumes system images'
      - '- Consumes host-side tools'
      variant: annotation
  - id: virt_instance
    level: 3
    direction: vertical
    gap: 0
    padding: 8
    sizing_h: hug
    heading: Virtualized Android instance
    icon: Virtual machine.svg
    children:
    - id: virt_unmodified
      label:
      - '- Unmodified Cuttlefish-based Android'
      - '- No rebuild required'
      variant: annotation
