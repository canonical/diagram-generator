schema: author-v1
engine: v3
title: Production contract - deployment pattern
meta:
  diagram_type: deployment_and_runtime_topology
  layout_engine: elk-layered
  source_image: diagrams/1.input/ai-infra/image copy 2.png
  elk:
    elk.direction: RIGHT
    elk.layered.spacing.nodeNodeBetweenLayers: 48
    elk.spacing.nodeNode: 24
    elk.spacing.edgeNode: 24
    elk.spacing.edgeEdge: 16
    elk.layered.spacing.edgeEdgeBetweenLayers: 16
    elk.layered.unnecessaryBendpoints: true
    elk.layered.nodePlacement.favorStraightEdges: true
    elk.layered.layering.strategy: LONGEST_PATH
    elk.layered.crossingMinimization.strategy: LAYER_SWEEP
    elk.layered.nodePlacement.strategy: BRANDES_KOEPF
    elk.hierarchyHandling: INCLUDE_CHILDREN
  elk_nodes:
    elk-layered:
      elk.direction: RIGHT
      elk.layered.spacing.nodeNodeBetweenLayers: 48
      elk.spacing.nodeNode: 24
      elk.spacing.edgeNode: 24
      elk.spacing.edgeEdge: 16
      elk.layered.spacing.edgeEdgeBetweenLayers: 16
      elk.layered.unnecessaryBendpoints: true
      elk.layered.nodePlacement.favorStraightEdges: true
      elk.layered.layering.strategy: LONGEST_PATH
      elk.layered.crossingMinimization.strategy: LAYER_SWEEP
      elk.layered.nodePlacement.strategy: BRANDES_KOEPF
      elk.hierarchyHandling: INCLUDE_CHILDREN
    elk-force:
      elk.spacing.nodeNode: 24
    elk-stress:
      elk.stress.dimension: XY
      elk.stress.epsilon: 0.001
      elk.stress.iterationLimit: 2147483647
      elk.stress.desiredEdgeLength: 100
      elk.edgeLabels.inline: true
grid:
  cols: 3
  col_gap: 32
  row_gap: 24
