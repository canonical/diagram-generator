engine: v3
title: TLS certificate provider topology
meta:
  diagram_type: deployment_and_runtime_topology
  layout_engine: elk-layered
  source_image: image-22.png
  elk:
    elk.direction: DOWN
    elk.layered.spacing.nodeNodeBetweenLayers: 24
    elk.spacing.nodeNode: 24
    elk.spacing.edgeNode: 24
    elk.spacing.edgeEdge: 24
    elk.layered.spacing.edgeEdgeBetweenLayers: 24
    elk.layered.unnecessaryBendpoints: true
    elk.layered.nodePlacement.favorStraightEdges: true
    elk.layered.layering.strategy: NETWORK_SIMPLEX
    elk.layered.crossingMinimization.strategy: LAYER_SWEEP
    elk.layered.nodePlacement.strategy: BRANDES_KOEPF
    elk.hierarchyHandling: INCLUDE_CHILDREN
  elk_nodes:
    elk-layered:
      elk.direction: DOWN
      elk.layered.spacing.nodeNodeBetweenLayers: 24
      elk.spacing.nodeNode: 24
      elk.spacing.edgeNode: 24
      elk.spacing.edgeEdge: 24
      elk.layered.spacing.edgeEdgeBetweenLayers: 24
      elk.layered.unnecessaryBendpoints: true
      elk.layered.nodePlacement.favorStraightEdges: true
      elk.layered.layering.strategy: NETWORK_SIMPLEX
      elk.layered.crossingMinimization.strategy: LAYER_SWEEP
      elk.layered.nodePlacement.strategy: BRANDES_KOEPF
      elk.hierarchyHandling: INCLUDE_CHILDREN
grid:
  cols: 3
  col_gap: 32
  row_gap: 48
arrows:
- source: vault_charm
  target: manual_tls_certificates
  label:
  - tls-certificates-pki
  label_gap: 24
- source: manual_tls_certificates
  target: octavia_k8s
- source: manual_tls_certificates
  target: traefik_public
- source: manual_tls_certificates
  target: traefik_internal
- source: manual_tls_certificates
  target: traefik_rgw
root:
  id: page
  direction: vertical
  width: 1536
  sizing_w: fixed
  children:
  - id: tls_provider
    level: 3
    heading: TLS Certificate Provider
    sizing_w: fill
    align: top-center
    children:
    - id: provider_stack
      direction: vertical
      variant: annotation
      align: top-center
      children:
      - id: vault_charm
        width: 176
        sizing_w: fixed
        label:
        - vault
        - charm
      - id: manual_tls_certificates
        width: 304
        sizing_w: fixed
        label:
        - manual-tls-certificates
        - charm
    - id: services_row
      direction: horizontal
      sizing_w: fill
      gap: 32
      children:
      - id: openstack_services
        level: 2
        heading: OpenStack Services
        sizing_w: fill
        children:
        - id: openstack_relation_row
          direction: horizontal
          variant: annotation
          gap: 16
          children:
          - id: octavia_certificates
            width: 176
            sizing_w: fixed
            fill: grey
            border: none
            label:
            - certificates
            - interface: tls-certificates
          - id: amphora_issuing_ca
            width: 224
            sizing_w: fixed
            fill: grey
            border: none
            label:
            - amphora-issuing-ca
            - interface: tls-certificates
          - id: amphora_controller_cert
            width: 248
            sizing_w: fixed
            fill: grey
            border: none
            label:
            - amphora-controller-cert
            - interface: tls-certificates
        - id: octavia_k8s
          width: 304
          sizing_w: fixed
          label:
          - octavia-k8s
          - Load Balancer Service
      - id: load_balancers
        level: 2
        heading: LoadBalancers
        direction: vertical
        sizing_w: fill
        children:
        - id: load_balancer_relation_row
          direction: horizontal
          variant: annotation
          justify: space-between
          gap: 16
          sizing_w: fill
          children:
          - id: public_certificates
            width: 184
            sizing_w: fixed
            fill: grey
            border: none
            label:
            - certificates
            - interface: tls-certificates
          - id: internal_certificates
            width: 184
            sizing_w: fixed
            fill: grey
            border: none
            label:
            - certificates
            - interface: tls-certificates
          - id: rgw_certificates
            width: 184
            sizing_w: fixed
            fill: grey
            border: none
            label:
            - certificates
            - interface: tls-certificates
        - id: load_balancer_endpoint_row
          direction: horizontal
          justify: space-between
          gap: 16
          sizing_w: fill
          children:
          - id: traefik_public
            width: 240
            sizing_w: fixed
            label:
            - traefik-public
            - Public Endpoint
          - id: traefik_internal
            width: 240
            sizing_w: fixed
            label:
            - traefik
            - Internal Endpoint
          - id: traefik_rgw
            width: 240
            sizing_w: fixed
            label:
            - traefik-rgw
            - Ceph RGW Endpoint
