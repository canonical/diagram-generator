engine: v3
title: "Box Style Contract Test"

root:
  id: root
  direction: vertical
  children:
    # Level 2 (panel) — container with heading + leaf children
    - id: panel_a
      heading: "Panel heading"
      icon: Cloud.svg
      children:
        - id: leaf_1
          label:
            - "Leaf box 1"
        - id: leaf_2
          label:
            - "Leaf box 2"
          icon: Chip 1.svg

    # Level 1 (box) — standalone leaf, no explicit styling
    - id: standalone_leaf
      label:
        - "Standalone leaf"

    # Highlight variant on a leaf
    - id: highlight_leaf
      variant: highlight
      label:
        - "Highlighted"

    # Highlight variant on a container
    - id: highlight_panel
      variant: highlight
      heading: "Dark panel"
      children:
        - id: inner_leaf
          label:
            - "Inside highlight"

    # Annotation variant
    - id: annotation_leaf
      variant: annotation
      label:
        - "Annotation text"

    # Three-tier hierarchy: section (level 3) → panel (level 2) → leaf
    - id: section_a
      heading: "Section heading"
      children:
        - id: nested_panel
          heading: "Nested panel"
          children:
            - id: deep_leaf
              label:
                - "Deep leaf"
