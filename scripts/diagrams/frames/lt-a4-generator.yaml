engine: v3
title: "A4 generator"
grid:
  cols: 3
  col_gap: 32
  row_gap: 24
  outer_margin: 24
arrows:
  - source: input_panel
    target: engine
  - source: guidelines
    target: engine
  - source: engine
    target: export_panel
root:
  id: page
  direction: vertical
  gap: 24
  padding: 24
  border: none
  children:
    # Row 0: input panel (right side, aligned with engine)
    - id: row0
      direction: horizontal
      gap: 32
      border: none
      children:
        - id: spacer0
          border: none
          label: []
          sizing_h: hug
        - id: input_panel
          direction: horizontal
          gap: 8
          padding: 8
          border: solid
          fill: grey
          fill_weight: 2
          heading: "2. Input"
          children:
            - id: copydoc
              label: [Copydoc]
              icon: Document.svg
            - id: template
              label: [InDesign, template]
              icon: Blueprint.svg

    # Row 1: guidelines (left) + engine (right)
    - id: row1
      direction: horizontal
      gap: 32
      border: none
      children:
        - id: guidelines
          direction: vertical
          gap: 8
          padding: 8
          border: solid
          fill: grey
          heading: "1. Guidelines"
          children:
            - id: typo
              label: [Typography]
              icon: Document.svg
            - id: spacing_guide
              label: [Spacing]
              icon: Document.svg
            - id: layout_guide
              label: [Layout]
              icon: Document.svg
        - id: engine
          direction: vertical
          gap: 8
          padding: 8
          border: solid
          fill: grey
          fill_weight: 2
          heading: "3. Engine"
          children:
            - id: format_engine
              label: [Format engine, "A4 / Letter / Legal"]
              icon: Composable.svg
            - id: baseline_validator
              label: [Baseline-grid, validator]
              icon: Rosette with check.svg
            - id: editor_box
              label: [Constrained, editor]
              icon: Screen with code.svg

    # Row 2: export panel (right side)
    - id: row2
      direction: horizontal
      gap: 32
      border: none
      children:
        - id: spacer2
          border: none
          label: []
          sizing_h: hug
        - id: export_panel
          direction: vertical
          gap: 8
          padding: 8
          border: solid
          fill: grey
          fill_weight: 2
          heading: "4. Export"
          children:
            - id: output_pdf
              label:
                - {text: PDF, fill: "#FFFFFF"}
              fill: black
              icon: Document.svg
              icon_fill: "#FFFFFF"
