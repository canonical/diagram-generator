engine: v3
title: "Deployment pipeline"
grid:
  cols: 1
  col_gap: 24
  row_gap: 24
  outer_margin: 24
arrows:
  - source: commit
    target: build
  - source: build
    target: test
  - source: test
    target: staging
  - source: staging
    target: approval
  - source: approval
    target: production
root:
  id: page
  direction: vertical
  gap: 24
  padding: 24
  border: none
  children:
    - id: commit
      label: [Developer, commit]
      icon: Laptop with code.svg
    - id: build
      label: [Build &, lint]
      fill: grey
      icon: Package.svg
    - id: test
      label: [Automated, tests]
      fill: grey
      icon: Rosette with check.svg
    - id: staging
      label: [Staging, environment]
      fill: grey
      icon: Cloud.svg
    - id: approval
      label: [Manual, approval]
      icon: User management.svg
    - id: production
      label:
        - {text: Production, weight: "700", fill: "#FFFFFF"}
        - {text: deploy, fill: "#FFFFFF"}
      fill: black
      icon: Server.svg
      icon_fill: "#FFFFFF"
