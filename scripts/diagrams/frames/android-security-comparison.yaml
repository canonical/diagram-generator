engine: v3
title: Android security comparison
grid:
  cols: 3
root:
  id: page
  direction: vertical
  padding: 24
  variant: annotation
  children:
  - id: top_zone
    direction: horizontal
    variant: annotation
    children:
    - id: col_container
      direction: vertical
      variant: annotation
      width: 288
      sizing_w: fill
      sizing_h: fill
      children:
      - id: hdr_container
        heading: Containerized Android
        variant: annotation
        sizing_h: hug
      - id: lxd_container
        level: 2
        direction: vertical
        padding: 8
        sizing_h: fill
        heading: LXD container
        children:
        - id: lxd_headline
          heading: SELinux removed
          sizing_h: hug
        - id: lxd_system
          label:
          - Android system
          sizing_h: hug
    - id: col_vm
      direction: vertical
      variant: annotation
      width: 288
      sizing_w: fill
      sizing_h: fill
      children:
      - id: hdr_vm
        heading: Virtualized Android
        variant: annotation
        sizing_h: hug
      - id: vm
        level: 2
        direction: vertical
        padding: 8
        sizing_h: fill
        heading: VM
        children:
        - id: vm_headline
          heading: SELinux ON
          label:
          - /enforcing mode
          - App sandboxing
          - System service isolation
          sizing_h: hug
        - id: vm_system
          label:
          - Android system
          sizing_h: hug
        - id: vm_kernel
          label:
          - Android kernel
          sizing_h: hug
    - id: note_top
      label:
      - SELinux assumptions only
      variant: annotation
      sizing_h: fill
      sizing_w: fill
  - id: security_separator
    role: separator
    variant: annotation
    sizing_h: hug
  - id: bottom_zone
    direction: horizontal
    variant: annotation
    children:
    - id: host_container
      label:
      - Host kernel (AppArmor)
      width: 288
      sizing_w: fill
    - id: host_vm
      label:
      - Host kernel (AppArmor)
      width: 288
      sizing_w: fill
    - id: note_bottom
      label:
      - AppArmor enforcement
      - / VM confinement
      variant: annotation
      sizing_w: fill
