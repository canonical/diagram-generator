engine: v3
title: MAAS machine lifecycle
arrows:
- source: new_box
  target: commissioning_boxes
- source: commissioning_boxes
  target: ready_box
- source: ready_box
  target: allocated_box
- source: allocated_box
  target: deploying_box
- source: deploying_box
  target: releasing_box
root:
  id: page
  direction: vertical
  padding: 24
  gap: 32
  width: 1008
  children:
  - id: new_row
    direction: horizontal
    children:
    - id: new_box
      label:
      - New
      icon: Server.svg
    - id: new_desc
      variant: annotation
      label:
      - Machines newly discovered by MAAS.
    sizing_h: fill
  - id: commissioning_row
    direction: horizontal
    children:
    - id: commissioning_boxes
      direction: horizontal
      gap: 8
      children:
      - id: comm_ram
        label:
        - RAM
        icon: RAM.svg
        sizing_h: hug
      - id: comm_cpu
        label:
        - CPU
        icon: CPU.svg
        sizing_h: hug
      - id: comm_disks
        label:
        - Disks
        icon: Data.svg
        sizing_h: hug
      - id: comm_nics
        label:
        - NICs
        icon: Networking.svg
        sizing_h: hug
    - id: commissioning_desc
      variant: annotation
      heading: Commissioning
      label:
      - Detailed inventory of RAM, CPU, disks,
      - NICs, and accelerators like GPUs itemized.
    sizing_h: fill
  - id: ready_row
    direction: horizontal
    children:
    - id: ready_box
      label:
      - Ready
      icon: Server.svg
    - id: ready_desc
      variant: annotation
      label:
      - A machine ready for allocation.
    sizing_h: fill
  - id: allocated_row
    direction: horizontal
    children:
    - id: allocated_box
      label:
      - Allocated
      icon: Server.svg
    - id: allocated_desc
      variant: annotation
      label:
      - Ready machines can be allocated to users.
      - Users can further configure the intended
      - deployment.
    sizing_h: fill
  - id: deploying_row
    direction: horizontal
    children:
    - id: deploying_box
      label:
      - Deploying
      icon: Server.svg
    - id: deploying_desc
      variant: annotation
      label:
      - Users then can ask MAAS to turn the machine on and install a complete server operating system from scratch without any manual intervention, configuring network interfaces, disk partitions, and more.
    sizing_h: fill
  - id: releasing_row
    direction: horizontal
    children:
    - id: releasing_box
      label:
      - Releasing
      icon: Server.svg
    - id: releasing_desc
      variant: annotation
      label:
      - The machine is securely released back to
      - the shared pool of capacity.
    sizing_h: fill
  height: 744
  sizing_h: fixed
  sizing_w: fixed
