engine: v3
schema: author-v1
title: Tiered network architecture

defaults:
  client:
    label: Client
    icon: Laptop.svg
  network_server:
    label:
    - Tier 2
    - Network server
    icon: Network.svg

arrows:
- public_repo -> global_server
- global_server -> tier2_left
- global_server -> tier2_center
- global_server -> tier2_right
- tier2_left -> client_l1
- tier2_left -> client_l2
- tier2_left -> client_l3
- tier2_center -> client_c1
- tier2_center -> client_c2
- tier2_center -> client_c3
- tier2_right -> client_r1
- tier2_right -> client_r2
- tier2_right -> client_r3

root:
  id: page
  direction: vertical
  align: top-center
  children:
  - id: public_repo
    label:
    - Public
    - repository
    icon: Cloud.svg
    sizing_w: fill
  - id: global_server
    label:
    - Tier 1
    - Global server
    icon: Server.svg
    sizing_w: fill
  - id: tier2_row
    direction: horizontal
    children:
    - id: group_left
      level: 2
      direction: vertical
      children:
      - id: tier2_left
        use: network_server
      - id: clients_left_top
        direction: horizontal
        children:
        - id: client_l1
          use: client
        - id: client_l2
          use: client
      - id: client_l3
        use: client
    - id: group_center
      level: 2
      direction: vertical
      children:
      - id: tier2_center
        use: network_server
      - id: clients_center_top
        direction: horizontal
        children:
        - id: client_c1
          use: client
        - id: client_c2
          use: client
      - id: client_c3
        use: client
    - id: group_right
      level: 2
      direction: vertical
      children:
      - id: tier2_right
        use: network_server
      - id: clients_right_top
        direction: horizontal
        children:
        - id: client_r1
          use: client
        - id: client_r2
          use: client
      - id: client_r3
        use: client
