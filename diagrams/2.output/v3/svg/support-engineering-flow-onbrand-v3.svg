  <g data-component-id="step_fix">
  <rect x="1008" y="24" width="304" height="304" fill="#F3F3F3" stroke="#000000" stroke-width="1" stroke-miterlimit="10" data-orig-width="304" data-orig-height="304" data-orig-fill="#F3F3F3"/>
  <text font-family="Ubuntu Sans" data-orig-inner="&#10;    &lt;tspan x=&quot;1016&quot; y=&quot;48.92&quot; font-size=&quot;18&quot; font-weight=&quot;700&quot; fill=&quot;#000000&quot;&gt;The fix&lt;/tspan&gt;&#10;    &lt;tspan x=&quot;1016&quot; y=&quot;72.92&quot; font-size=&quot;18&quot; font-weight=&quot;400&quot; fill=&quot;#000000&quot;&gt;&lt;/tspan&gt;&#10;    &lt;tspan x=&quot;1016&quot; y=&quot;96.92&quot; font-size=&quot;18&quot; font-weight=&quot;400&quot; fill=&quot;#000000&quot;&gt;Canonical Support engineers&lt;/tspan&gt;&#10;    &lt;tspan x=&quot;1016&quot; y=&quot;120.92&quot; font-size=&quot;18&quot; font-weight=&quot;400&quot; fill=&quot;#000000&quot;&gt;fix the code in a&lt;/tspan&gt;&#10;    &lt;tspan x=&quot;1016&quot; y=&quot;144.92&quot; font-size=&quot;18&quot; font-weight=&quot;400&quot; fill=&quot;#000000&quot;&gt;12-year-old repo,&lt;/tspan&gt;&#10;    &lt;tspan x=&quot;1016&quot; y=&quot;168.92&quot; font-size=&quot;18&quot; font-weight=&quot;400&quot; fill=&quot;#000000&quot;&gt;upstreaming the fix for&lt;/tspan&gt;&#10;    &lt;tspan x=&quot;1016&quot; y=&quot;192.92&quot; font-size=&quot;18&quot; font-weight=&quot;400&quot; fill=&quot;#000000&quot;&gt;all. They patch the issue,&lt;/tspan&gt;&#10;    &lt;tspan x=&quot;1016&quot; y=&quot;216.92&quot; font-size=&quot;18&quot; font-weight=&quot;400&quot; fill=&quot;#000000&quot;&gt;reducing nearly 49,000 disk&lt;/tspan&gt;&#10;    &lt;tspan x=&quot;1016&quot; y=&quot;240.92&quot; font-size=&quot;18&quot; font-weight=&quot;400&quot; fill=&quot;#000000&quot;&gt;reads to a single, fast&lt;/tspan&gt;&#10;    &lt;tspan x=&quot;1016&quot; y=&quot;264.92&quot; font-size=&quot;18&quot; font-weight=&quot;400&quot; fill=&quot;#000000&quot;&gt;alternative.&lt;/tspan&gt;&#10;  ">
    <tspan x="1016" y="48.92" font-size="18" font-weight="700" fill="#000000">The fix</tspan>
    <tspan x="1016" y="72.92" font-size="18" font-weight="400" fill="#000000"/>
    <tspan x="1016" y="96.92" font-size="18" font-weight="400" fill="#000000">Canonical Support engineers</tspan>
    <tspan x="1016" y="120.92" font-size="18" font-weight="400" fill="#000000">fix the code in a</tspan>
    <tspan x="1016" y="144.92" font-size="18" font-weight="400" fill="#000000">12-year-old repo,</tspan>
    <tspan x="1016" y="168.92" font-size="18" font-weight="400" fill="#000000">upstreaming the fix for</tspan>
    <tspan x="1016" y="192.92" font-size="18" font-weight="400" fill="#000000">all. They patch the issue,</tspan>
    <tspan x="1016" y="216.92" font-size="18" font-weight="400" fill="#000000">reducing nearly 49,000 disk</tspan>
    <tspan x="1016" y="240.92" font-size="18" font-weight="400" fill="#000000">reads to a single, fast</tspan>
    <tspan x="1016" y="264.92" font-size="18" font-weight="400" fill="#000000">alternative.</tspan>
  </text>
