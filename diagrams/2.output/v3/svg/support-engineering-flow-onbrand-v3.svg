    <tspan x="688" y="48.92" font-size="18" font-weight="700" fill="#000000">Support Engineering</tspan>
    <tspan x="688" y="72.92" font-size="18" font-weight="700" fill="#000000">analysis</tspan>
    <tspan x="688" y="96.92" font-size="18" font-weight="400" fill="#000000"/>
    <tspan x="688" y="120.92" font-size="18" font-weight="400" fill="#000000">The issue isn’t a quick</tspan>
    <tspan x="688" y="144.92" font-size="18" font-weight="400" fill="#000000">package fix. Canonical</tspan>
    <tspan x="688" y="168.92" font-size="18" font-weight="400" fill="#000000">Support engineers dive</tspan>
    <tspan x="688" y="192.92" font-size="18" font-weight="400" fill="#000000">deep into the source code.</tspan>
