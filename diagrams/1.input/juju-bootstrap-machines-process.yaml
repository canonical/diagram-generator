engine: v3
title: Juju bootstrap on machines (process)
meta:
  diagram_type: process_and_workflow
  layout_engine: elk-layered
  elk:
    elk.direction: DOWN
    elk.layered.spacing.nodeNodeBetweenLayers: 24
    elk.spacing.nodeNode: 24
    elk.spacing.edgeNode: 24
    elk.spacing.edgeEdge: 24
    elk.layered.spacing.edgeEdgeBetweenLayers: 24
    elk.layered.unnecessaryBendpoints: true
    elk.layered.nodePlacement.favorStraightEdges: true
    elk.layered.layering.strategy: LONGEST_PATH
    elk.layered.crossingMinimization.strategy: LAYER_SWEEP
    elk.layered.nodePlacement.strategy: BRANDES_KOEPF
    elk.hierarchyHandling: INCLUDE_CHILDREN
  abstraction_level: context
  corpus_content_hash: sha256:983e195f9303c86c
  corpus_estate: output-juju-docs
  source_image: juju-architecture-bootstrap-machines-process.png
  elk_nodes:
    elk-layered:
      elk.direction: DOWN
      elk.layered.spacing.nodeNodeBetweenLayers: 24
      elk.spacing.nodeNode: 24
      elk.spacing.edgeNode: 24
      elk.spacing.edgeEdge: 24
      elk.layered.spacing.edgeEdgeBetweenLayers: 24
      elk.layered.unnecessaryBendpoints: true
      elk.layered.nodePlacement.favorStraightEdges: true
      elk.layered.layering.strategy: LONGEST_PATH
      elk.layered.crossingMinimization.strategy: LAYER_SWEEP
      elk.layered.nodePlacement.strategy: BRANDES_KOEPF
      elk.hierarchyHandling: INCLUDE_CHILDREN
    elk-force:
      elk.spacing.nodeNode: 24
      elk.force.model: FRUCHTERMAN_REINGOLD
      elk.force.iterations: 3
      elk.aspectRatio: 1
      elk.separateConnectedComponents: true
      elk.randomSeed: 555
      elk.force.temperature: 0.001
    elk-stress:
      elk.stress.dimension: XY
      elk.stress.epsilon: 0.00001
      elk.stress.iterationLimit: 454
      elk.stress.desiredEdgeLength: 500
      elk.edgeLabels.inline: true
    elk-mrtree:
      elk.direction: DOWN
      elk.spacing.nodeNode: 72
      elk.spacing.edgeNode: 32
      elk.separateConnectedComponents: true
      elk.aspectRatio: 1
      elk.mrtree.compaction: false
      elk.mrtree.weighting: FAN
      elk.mrtree.searchOrder: DFS
      elk.mrtree.edgeRoutingMode: AVOID_OVERLAP
      elk.mrtree.edgeEndTextureLength: 24
grid:
  cols: 3
  col_gap: 32
  row_gap: 32
arrows:
- id: step1
  source: client
  target: simplestreams_binaries
  label: '1: Requests agent binary location from'
  label_gap: 24
- id: step2
  source: client
  target: simplestreams_images
  label: '2: Requests resource image location from'
  label_gap: 24
- id: step3
  source: client
  target: cloud
  label: '3: Requests initial machine from'
  label_gap: 24
- id: step4
  source: cloud
  target: client
  label: '4: Provisions and sends resource contact info to'
  label_gap: 24
- id: step5
  source: client
  target: controller_agent
  label: '5: SSHs into resource and sets everything up, including'
  label_gap: 24
- id: step6
  source: controller_agent
  target: snap_store
  label: '6: Downloads the database snap (juju-db) from'
  label_gap: 24
- id: step7
  source: controller_agent
  target: charmhub
  label: '7: Downloads the controller charm (juju-controller) from'
  label_gap: 24
