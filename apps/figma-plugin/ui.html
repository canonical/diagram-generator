<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Diagram Generator Figma Import</title>
  <style>
    body {
      font-family: Inter, Arial, sans-serif;
      margin: 0;
      padding: 16px;
      color: #111;
      background: #f6f4ef;
    }

    h1 {
      font-size: 16px;
      margin: 0 0 8px;
    }

    p {
      font-size: 12px;
      line-height: 1.5;
      margin: 0 0 12px;
    }

    label {
      display: block;
      font-size: 12px;
      margin-bottom: 6px;
      font-weight: 600;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 8px 10px;
      border: 1px solid #c7c2b6;
      background: #fffdf8;
      margin-bottom: 12px;
    }

    button {
      width: 100%;
      border: 0;
      padding: 10px 12px;
      background: #0f6cbd;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    button:disabled {
      cursor: default;
      opacity: 0.6;
    }

    #fileInput {
      display: none;
    }

    #status {
      margin-top: 12px;
      min-height: 36px;
      font-size: 12px;
      line-height: 1.5;
      color: #444;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <h1>Figma diagram import</h1>
  <p>Select a frame YAML file and import it as native editable Figma layers.</p>

  <label for="serverUrl">Local server</label>
  <input id="serverUrl" value="http://localhost:3846" />

  <button id="selectYamlButton" type="button">Select YAML to import</button>
  <input id="fileInput" type="file" accept=".yaml,.yml,text/yaml,application/x-yaml" />

  <div id="status">Idle.</div>

  <script>
    const serverInput = document.getElementById("serverUrl");
    const selectYamlButton = document.getElementById("selectYamlButton");
    const fileInput = document.getElementById("fileInput");
    const status = document.getElementById("status");

    function formatText(value) {
      if (typeof value === "string") return value;
      try {
        return JSON.stringify(value, null, 2);
      } catch (_error) {
        return String(value);
      }
    }

    function setStatus(text) {
      status.textContent = formatText(text);
    }

    function readFallbackFile() {
      return new Promise((resolve) => {
        fileInput.onchange = () => {
          const file = fileInput.files && fileInput.files[0];
          fileInput.value = "";
          resolve(file || null);
        };
        fileInput.click();
      });
    }

    async function pickYamlFile() {
      if (typeof window.showOpenFilePicker === "function") {
        const [handle] = await window.showOpenFilePicker({
          multiple: false,
          types: [{
            description: "YAML",
            accept: {
              "text/yaml": [".yaml", ".yml"],
            },
          }],
        });
        return handle ? handle.getFile() : null;
      }
      return readFallbackFile();
    }

    async function importSelectedYaml() {
      selectYamlButton.disabled = true;
      try {
        const file = await pickYamlFile();
        if (!file) {
          setStatus("No YAML file selected.");
          return;
        }
        const yaml = await file.text();
        if (!yaml.trim()) {
          setStatus("Selected YAML file is empty.");
          return;
        }
        setStatus(`Importing ${file.name}...`);
        parent.postMessage({
          pluginMessage: {
            type: "import-yaml",
            serverUrl: serverInput.value,
            sourceName: file.name,
            yaml,
          },
        }, "*");
      } catch (error) {
        setStatus(`Error: ${formatText(error && error.message ? error.message : error)}`);
      } finally {
        selectYamlButton.disabled = false;
      }
    }

    selectYamlButton.addEventListener("click", () => {
      importSelectedYaml();
    });

    onmessage = (event) => {
      const message = event.data.pluginMessage;
      if (!message) return;

      if (message.type === "status" || message.type === "done") {
        setStatus(message.text);
        return;
      }

      if (message.type === "error") {
        setStatus(`Error: ${formatText(message.text)}`);
      }
    };
  </script>
</body>
</html>
